name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          bun build --compile --minify \
            --define "__APP_VERSION__='\"${{ steps.version.outputs.VERSION }}\"'" \
            src/index.ts --outfile dist/carecom-darwin-arm64

      - name: Generate checksum
        working-directory: dist
        run: shasum -a 256 carecom-darwin-arm64 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/carecom-darwin-arm64
            dist/checksums.txt
